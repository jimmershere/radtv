name: build-iptv
# Daily run that rebuilds iptv/dist/badtv.m3u + badtv.xml from
# iptv/sources.yaml and commits the result back to main. Without this the
# raw.githubusercontent.com URLs the wizard hardcodes return 404.

on:
  schedule:
    # 06:42 UTC -- 25 minutes after refresh-scrapers, so the two bots don't
    # collide on the same push (and so a failure in one doesn't mask the other).
    - cron: "42 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "iptv/sources.yaml"
      - "iptv/build-playlist.py"
      - ".github/workflows/build-iptv.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build merged IPTV playlist + EPG
    runs-on: ubuntu-latest
    concurrency:
      group: build-iptv
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install --quiet pyyaml

      - name: Build playlist + EPG
        env:
          # Bake the raw.githubusercontent.com URL into the M3U's url-tvg
          # header so end-user PVR clients can find the EPG. Without this
          # override the script defaults to file:// against the runner's
          # ephemeral path, which obviously doesn't resolve in users' Kodi.
          EPG_PUBLIC_URL: "https://raw.githubusercontent.com/${{ github.repository }}/main/iptv/dist/badtv.xml"
        run: |
          python3 iptv/build-playlist.py --epg-url "$EPG_PUBLIC_URL"
          echo "--- output ---"
          ls -lh iptv/dist/
          echo "--- m3u header ---"
          head -1 iptv/dist/badtv.m3u

      - name: Sanity-check sizes
        run: |
          # M3U should be > 1 KB and contain #EXTM3U; XML should be > 1 KB
          # and contain a <tv> element. Anything smaller means every source
          # failed and we shouldn't commit the regression.
          m3u="iptv/dist/badtv.m3u"
          xml="iptv/dist/badtv.xml"
          [[ -s "$m3u" && $(stat -c%s "$m3u") -gt 1024 ]] || { echo "m3u too small"; exit 1; }
          [[ -s "$xml" && $(stat -c%s "$xml") -gt 1024 ]] || { echo "xml too small"; exit 1; }
          grep -q '#EXTM3U' "$m3u" || { echo "no #EXTM3U header"; exit 1; }
          grep -q '<tv'     "$xml" || { echo "no <tv> root in xml"; exit 1; }
          echo "sanity ok"

      - name: Show diff
        run: |
          git --no-pager diff --stat iptv/dist/ || true

      - name: Commit and push if changed
        env:
          GIT_AUTHOR_NAME: "B@Dtv catalog bot"
          GIT_AUTHOR_EMAIL: "badtv-bot@users.noreply.github.com"
          GIT_COMMITTER_NAME: "B@Dtv catalog bot"
          GIT_COMMITTER_EMAIL: "badtv-bot@users.noreply.github.com"
        run: |
          # iptv/dist/* is gitignored; force-add the two artifacts we care about.
          git add -f iptv/dist/badtv.m3u iptv/dist/badtv.xml
          if git diff --cached --quiet; then
            echo "No playlist changes."
            exit 0
          fi
          git commit -m "chore(iptv): rebuild merged playlist + EPG

          Automated by .github/workflows/build-iptv.yml.
          Source list: iptv/sources.yaml.
          Merger: iptv/build-playlist.py."
          git push
