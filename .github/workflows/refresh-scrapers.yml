name: refresh-scrapers
# Daily run that re-probes every URL in addons/scraper-catalog.json and
# commits any status / version changes back to main. Manual runs available
# via workflow_dispatch.

on:
  schedule:
    # 06:17 UTC = early enough to land before US morning, offset 17 to dodge
    # the cron stampede that hammers GitHub Actions every hour mark.
    - cron: "17 6 * * *"
  workflow_dispatch:
  push:
    paths:
      - "tools/refresh-scrapers.py"
      - "addons/scraper-catalog.json"
      - ".github/workflows/refresh-scrapers.yml"

permissions:
  contents: write

jobs:
  refresh:
    name: Probe scraper repo URLs
    runs-on: ubuntu-latest
    concurrency:
      group: refresh-scrapers
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run refresh script
        run: |
          python3 tools/refresh-scrapers.py --print-summary

      - name: Show diff
        run: |
          git --no-pager diff --stat addons/scraper-catalog.json || true
          git --no-pager diff addons/scraper-catalog.json | head -200 || true

      - name: Commit and push if changed
        env:
          GIT_AUTHOR_NAME: "R&Dtv catalog bot"
          GIT_AUTHOR_EMAIL: "radtv-bot@users.noreply.github.com"
          GIT_COMMITTER_NAME: "R&Dtv catalog bot"
          GIT_COMMITTER_EMAIL: "radtv-bot@users.noreply.github.com"
        run: |
          if git diff --quiet addons/scraper-catalog.json; then
            echo "No catalog changes."
            exit 0
          fi
          git add addons/scraper-catalog.json
          git commit -m "chore(catalog): refresh scraper repo statuses

          Automated by .github/workflows/refresh-scrapers.yml.
          See tools/refresh-scrapers.py for the probing logic."
          git push
