# R&Dtv IPTV sources.
#
# Declarative list of M3U + XMLTV sources the build script pulls and merges
# into a single playlist + EPG. Keep entries grouped by category so users can
# enable/disable broad slices via config/radtv.conf.example IPTV_INCLUDE_*.
#
# Field reference:
#   id        unique slug, used for logs and dedup
#   name      human label
#   category  us_free | news | international | sports | music | regional
#   m3u       URL or path to playlist (omit if epg-only)
#   epg       URL or path to XMLTV (omit if m3u-only)
#   tvg_id    set if the EPG keys channels by a different tvg-id than the M3U
#   group     prefix to prepend to channel `group-title` (cosmetic ordering)
#   enabled   true|false (overrideable from CLI: --only-id=foo, --skip-id=bar)
#   notes     human-only

sources:

  # --- US free / legal -------------------------------------------------------
  #
  # Matt Huisman (i.mjh.nz) consolidated his per-service playlists -- Pluto TV,
  # Plex Live, Samsung TV+, Stirr, Roku, PBS, Tubi-EPG, etc. -- into a single
  # `/all/kodi-tv.m3u8` and matching `/all/epg.xml`. One source line now
  # delivers everything that used to be four broken URLs.
  - id: mjh-kodi-all
    name: MJH Kodi combined (Pluto / Plex / Samsung TV+ / Stirr / Roku / PBS)
    category: us_free
    enabled: true
    m3u: https://i.mjh.nz/all/kodi-tv.m3u8
    epg: https://i.mjh.nz/all/epg.xml
    group: "MJH"
    notes: |
      MJH ships several variants: kodi-tv.m3u8 (TV-only, our default),
      kodi-radio.m3u8 (radio), kodi.m3u8 (combined), raw-tv.m3u8 (provider-
      agnostic). Switch by editing this entry.

  # Per-service EPGs are still available per country if you want a smaller,
  # service-targeted guide. Off by default -- the combined MJH EPG above
  # already covers them.
  - id: mjh-plutotv-us
    name: MJH PlutoTV US EPG (per-service)
    category: epg
    enabled: false
    epg: https://i.mjh.nz/PlutoTV/us.xml

  - id: mjh-plex-us
    name: MJH Plex US EPG (per-service)
    category: epg
    enabled: false
    epg: https://i.mjh.nz/Plex/us.xml

  - id: mjh-samsung-us
    name: MJH Samsung TV+ US EPG (per-service)
    category: epg
    enabled: false
    epg: https://i.mjh.nz/SamsungTVPlus/us.xml

  # --- News ------------------------------------------------------------------

  - id: iptv-org-news
    name: iptv-org / News
    category: news
    enabled: true
    m3u: https://iptv-org.github.io/iptv/categories/news.m3u
    group: "News"

  - id: news-on
    name: NewsOn (local US news, community list)
    category: news
    enabled: false
    notes: |
      Local affiliates rotate constantly; only enable if you maintain your
      own M3U pointing at currently-live streams.

  # --- International ---------------------------------------------------------

  - id: iptv-org-index
    name: iptv-org / Index (all countries)
    category: international
    enabled: true
    m3u: https://iptv-org.github.io/iptv/index.m3u
    group: "International"
    notes: Large. Consider per-country lists below if you want to slim down.

  - id: iptv-org-gb
    name: iptv-org / United Kingdom
    category: international
    enabled: false
    m3u: https://iptv-org.github.io/iptv/countries/gb.m3u
    group: "UK"

  - id: iptv-org-ca
    name: iptv-org / Canada
    category: international
    enabled: false
    m3u: https://iptv-org.github.io/iptv/countries/ca.m3u
    group: "Canada"

  - id: iptv-org-mx
    name: iptv-org / Mexico
    category: international
    enabled: false
    m3u: https://iptv-org.github.io/iptv/countries/mx.m3u
    group: "Mexico"

  - id: iptv-org-de
    name: iptv-org / Germany
    category: international
    enabled: false
    m3u: https://iptv-org.github.io/iptv/countries/de.m3u
    group: "Germany"

  - id: iptv-org-br
    name: iptv-org / Brazil
    category: international
    enabled: false
    m3u: https://iptv-org.github.io/iptv/countries/br.m3u
    group: "Brazil"

  # --- Sports ---------------------------------------------------------------

  - id: iptv-org-sports
    name: iptv-org / Sports
    category: sports
    enabled: true
    m3u: https://iptv-org.github.io/iptv/categories/sports.m3u
    group: "Sports"

  # --- Music ---------------------------------------------------------------

  - id: iptv-org-music
    name: iptv-org / Music
    category: music
    enabled: true
    m3u: https://iptv-org.github.io/iptv/categories/music.m3u
    group: "Music"

  # --- Standalone EPG sources -----------------------------------------------
  # Useful when you maintain your own M3U but want a community EPG to back it.

  - id: epg-pw
    name: epg.pw global guide
    category: epg
    enabled: true
    epg: https://epg.pw/xmltv/epg.xml
    notes: |
      epg.pw covers many US, UK, Canadian, and Australian channels. Used as a
      fallback EPG layer after the per-source EPG matches above.
