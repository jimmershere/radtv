<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="R&Dtv icon">
  <title>R&Dtv icon</title>
  <defs>
    <radialGradient id="bar" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#231613"/>
      <stop offset="1" stop-color="#0B0B0D"/>
    </radialGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F0BE63"/>
      <stop offset="1" stop-color="#A87421"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- rounded-square base -->
  <rect width="512" height="512" rx="72" ry="72" fill="url(#bar)"/>

  <!-- spotlight from above -->
  <ellipse cx="256" cy="180" rx="220" ry="80" fill="#D4A24C" opacity="0.06" filter="url(#glow)"/>

  <!-- brick-red bottom band -->
  <rect x="0" y="430" width="512" height="82" fill="#6B1A1F"/>
  <rect x="0" y="430" width="512" height="4"  fill="#8A6A2A" opacity="0.7"/>

  <!-- @ as the hero glyph: bullet hole / shot glass / spotlight -->
  <g transform="translate(256 250) rotate(6)" filter="url(#glow)">
    <text x="0" y="60" text-anchor="middle"
          font-family="Cinzel, 'Trajan Pro', Georgia, serif"
          font-size="380" font-weight="700" fill="url(#amber)">@</text>
  </g>

  <!-- tiny B and D shoulders behind, like initials -->
  <g font-family="Cinzel, Georgia, serif" font-weight="700" fill="#E8DCC0" opacity="0.85">
    <text x="60"  y="120" font-size="80">B</text>
    <text x="380" y="120" font-size="80">D</text>
  </g>

  <!-- caption -->
  <text x="256" y="478" text-anchor="middle"
        font-family="Inter, sans-serif" font-size="36" font-weight="600"
        fill="#E8DCC0" letter-spacing="8">R&Dtv</text>
</svg>
