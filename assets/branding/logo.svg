<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" role="img" aria-label="R&amp;Dtv RAD BMX jellyfish logo">
  <title>R&amp;Dtv RAD BMX jellyfish logo</title>
  <desc>An 80s BMX bike with a glowing jellyfish rider and large RAD lettering for R&amp;Dtv.</desc>
  <defs>
    <linearGradient id="sunset" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff4bd8"/>
      <stop offset="0.45" stop-color="#ff8a2a"/>
      <stop offset="1" stop-color="#151024"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f1d6"/>
      <stop offset="0.4" stop-color="#54f5ff"/>
      <stop offset="1" stop-color="#8b6cff"/>
    </linearGradient>
    <linearGradient id="jelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bffcff"/>
      <stop offset="0.55" stop-color="#4de7ff"/>
      <stop offset="1" stop-color="#8b4dff"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0v56" fill="none" stroke="#54f5ff" stroke-width="2" opacity="0.25"/>
    </pattern>
  </defs>

  <rect width="1400" height="620" fill="#090715"/>
  <circle cx="1040" cy="210" r="285" fill="url(#sunset)" opacity="0.9"/>
  <path d="M740 494c95-58 188-105 293-139 120-39 244-46 367-27v292H0v-76c213 30 468 49 740-50Z" fill="#10172d"/>
  <path d="M0 386h1400v234H0Z" fill="url(#grid)" opacity="0.45"/>
  <path d="M0 508h1400" stroke="#ff4bd8" stroke-width="4" opacity="0.65"/>
  <path d="M0 560h1400" stroke="#54f5ff" stroke-width="3" opacity="0.55"/>

  <g filter="url(#neon)">
    <text x="80" y="215" font-family="'Arial Black', Impact, sans-serif" font-size="182" font-style="italic" font-weight="900" fill="#ffec5c" stroke="#ff4bd8" stroke-width="8" letter-spacing="-10">RAD</text>
    <text x="96" y="300" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#f8f1d6" letter-spacing="12">R&amp;Dtv</text>
    <text x="100" y="345" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800" fill="#54f5ff" letter-spacing="7">STREAMING · MEDIA · 2026</text>
  </g>

  <g id="bike" transform="translate(485 164)">
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="165" cy="285" r="96" stroke="#f8f1d6" stroke-width="13"/>
      <circle cx="165" cy="285" r="67" stroke="#54f5ff" stroke-width="5" opacity="0.7"/>
      <circle cx="552" cy="285" r="96" stroke="#f8f1d6" stroke-width="13"/>
      <circle cx="552" cy="285" r="67" stroke="#54f5ff" stroke-width="5" opacity="0.7"/>
      <path d="M165 285h146l92-112 149 112H311l-74-118h166" stroke="url(#chrome)" stroke-width="17"/>
      <path d="M403 173l52-67h82" stroke="#ffec5c" stroke-width="14"/>
      <path d="M232 167l-46-62h-58" stroke="#ff4bd8" stroke-width="14"/>
      <path d="M311 285l-64 71m64-71 67 69" stroke="#f8f1d6" stroke-width="10"/>
      <circle cx="311" cy="285" r="16" fill="#ffec5c" stroke="#090715" stroke-width="5"/>
      <path d="M186 105c28-34 73-36 116-10" stroke="#54f5ff" stroke-width="11"/>
      <path d="M535 106c36-25 74-22 102 8m-100-8 47 83" stroke="#54f5ff" stroke-width="11"/>
    </g>
    <g filter="url(#neon)">
      <path d="M296 99c0-49 49-84 105-84s105 35 105 84c0 42-35 76-84 84-12 2-26 3-42 3-16 0-30-1-42-3-49-8-42-42-42-84Z" fill="url(#jelly)" stroke="#f8f1d6" stroke-width="7"/>
      <path d="M319 118c34 18 126 18 164 0" fill="none" stroke="#090715" stroke-width="6" opacity="0.45"/>
      <circle cx="370" cy="78" r="10" fill="#090715"/>
      <circle cx="427" cy="78" r="10" fill="#090715"/>
      <path d="M379 112c12 11 29 11 42 0" fill="none" stroke="#090715" stroke-width="7" stroke-linecap="round"/>
      <path d="M338 180c-6 36-51 48-38 86m66-82c-8 39 35 58 14 99m54-99c15 35-31 59-10 99m54-103c8 36 51 48 38 86" fill="none" stroke="#54f5ff" stroke-width="8" stroke-linecap="round"/>
      <path d="M338 174c-27 9-53 27-73 59m214-60c34 8 58 28 74 61" fill="none" stroke="#ffec5c" stroke-width="9" stroke-linecap="round"/>
    </g>
  </g>

  <g opacity="0.9" filter="url(#softGlow)">
    <circle cx="560" cy="116" r="10" fill="#54f5ff"/>
    <circle cx="1250" cy="98" r="12" fill="#ffec5c"/>
    <circle cx="1170" cy="470" r="10" fill="#ff4bd8"/>
    <circle cx="205" cy="462" r="8" fill="#54f5ff"/>
  </g>
</svg>
