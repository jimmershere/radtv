<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="R&Dtv fanart">
  <title>R&Dtv fanart</title>
  <defs>
    <linearGradient id="vignette" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0"   stop-color="#000" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#000" stop-opacity="0.55"/>
      <stop offset="1"   stop-color="#000" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="amberWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4A24C" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#0B0B0D" stop-opacity="0.0"/>
    </linearGradient>
    <pattern id="brick" x="0" y="0" width="220" height="80" patternUnits="userSpaceOnUse">
      <rect width="220" height="80" fill="#1A0F0E"/>
      <rect x="0"   y="0"  width="210" height="38" fill="#22130F"/>
      <rect x="110" y="40" width="210" height="38" fill="#22130F"/>
      <rect x="-110" y="40" width="210" height="38" fill="#22130F"/>
    </pattern>
  </defs>

  <!-- brick wall background -->
  <rect width="1920" height="1080" fill="url(#brick)" opacity="0.95"/>

  <!-- soft amber wash from a bar light -->
  <rect width="1920" height="1080" fill="url(#amberWash)"/>

  <!-- vignette -->
  <rect width="1920" height="1080" fill="url(#vignette)"/>

  <!-- faint window light spill, lower right -->
  <polygon points="1300,0 1920,0 1920,540 1500,540" fill="#D4A24C" opacity="0.05"/>

  <!-- R&Dtv wordmark, lower-left corner -->
  <g transform="translate(160 880)" font-family="Cinzel, Georgia, serif" font-weight="700">
    <text x="0" y="0" font-size="160" fill="#E8DCC0">B</text>
    <g transform="translate(170 0) rotate(6)">
      <text x="0" y="0" font-size="180" fill="#D4A24C">@</text>
    </g>
    <text x="350" y="0" font-size="160" fill="#E8DCC0">D</text>
    <text x="520" y="0" font-size="160" fill="#E8DCC0" font-style="italic">t</text>
    <text x="680" y="0" font-size="160" fill="#E8DCC0" font-style="italic">v</text>
    <rect x="6" y="32" width="800" height="4" fill="#6B1A1F"/>
    <text x="6" y="86" font-family="Inter, sans-serif" font-size="28"
          fill="#A89E84" letter-spacing="8">HELL'S KITCHEN GRADE KODI</text>
  </g>
</svg>
